name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate project
        run: |
          echo "Validate SQL scripts"
          find src -name '*.sql' -maxdepth 2
